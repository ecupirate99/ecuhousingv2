<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ECU Residence Hall Handbook Chatbot</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600&family=Oswald:wght@500;700&display=swap"
        rel="stylesheet">
</head>

<body class="bg-white text-slate-800 font-['Open_Sans'] h-screen flex flex-col overflow-hidden">

    <!-- ECU Branded Top Header -->
    <header
        class="bg-[#592a8a] text-white p-4 flex items-center justify-between border-b-4 border-[#fec923] shadow-lg relative z-10">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-white rounded-lg flex items-center justify-center">
                <i class="fas fa-graduation-cap text-[#592a8a] text-xl"></i>
            </div>
            <div>
                <h1 class="text-xl font-['Oswald'] font-bold tracking-tight uppercase">ECU Housing</h1>
                <p class="text-[10px] font-bold text-[#fec923] uppercase tracking-widest -mt-1">Residence Hall Assistant
                </p>
            </div>
        </div>
        <button id="toggle-sidebar" class="text-white p-2 hover:bg-white/10 rounded-lg transition-colors">
            <i class="fas fa-cog text-xl"></i>
        </button>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <!-- Sidebar (Hidden by Default) -->
        <aside id="sidebar"
            class="fixed inset-y-0 left-0 z-50 w-72 bg-slate-50 border-r border-slate-200 transition-transform -translate-x-full flex flex-col shadow-2xl">
            <div class="p-6 border-b border-slate-200 flex items-center gap-3">
                <div class="w-10 h-10 bg-[#592a8a] rounded-xl flex items-center justify-center">
                    <i class="fas fa-cog text-white"></i>
                </div>
                <div>
                    <h1 class="text-md font-['Oswald'] font-bold text-slate-800 uppercase tracking-tight">System
                        Settings</h1>
                </div>
            </div>

            <div class="p-6 flex-1 overflow-y-auto space-y-8">
                <!-- Upload Section -->
                <div>
                    <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Handbook Repository</h2>
                    <label for="pdf-upload"
                        class="flex flex-col items-center justify-center p-6 border-2 border-dashed border-slate-300 rounded-2xl hover:border-[#592a8a] hover:bg-[#592a8a]/5 cursor-pointer transition-all group">
                        <div
                            class="w-12 h-12 bg-slate-100 rounded-full flex items-center justify-center mb-3 group-hover:scale-110 transition-transform">
                            <i class="fas fa-file-pdf text-[#592a8a] text-xl"></i>
                        </div>
                        <span class="text-sm font-semibold text-slate-700">Upload PDF</span>
                        <input type="file" id="pdf-upload" class="hidden" accept=".pdf">
                    </label>
                    <div id="upload-status" class="mt-4 hidden">
                        <div class="flex items-center justify-between text-xs mb-1">
                            <span id="upload-filename"
                                class="truncate max-w-[150px] text-slate-400">Processing...</span>
                            <span id="upload-percent" class="text-indigo-400">0%</span>
                        </div>
                        <div class="w-full bg-white/10 rounded-full h-1.5">
                            <div id="upload-bar" class="bg-indigo-500 h-1.5 rounded-full transition-all duration-300"
                                style="width: 0%"></div>
                        </div>
                    </div>
                </div>

                <!-- Model Selection -->
                <div>
                    <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Active Intelligence</h2>
                    <select id="model-select"
                        class="w-full bg-white border border-slate-200 rounded-xl px-4 py-3 text-sm font-semibold text-slate-700 shadow-sm focus:outline-none focus:ring-2 focus:ring-[#592a8a]/20">
                        <option value="llama-3.3-70b-versatile">Llama 3.3 70B (Pro)</option>
                        <option value="llama-3.1-8b-instant">Llama 3.1 8B (Fast)</option>
                    </select>
                </div>

                <!-- Recent Files -->
                <div id="files-list-container">
                    <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest mb-4">Indexed Files</h2>
                    <ul id="files-list" class="space-y-2">
                        <!-- Files will be added here -->
                    </ul>
                </div>
            </div>

            <!-- Sidebar Footer -->
            <div class="p-6 bg-white border-t border-slate-100">
                <div class="flex items-center gap-3">
                    <div class="p-2 bg-emerald-50 rounded-lg">
                        <div class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></div>
                    </div>
                    <span class="text-xs font-bold text-slate-500 uppercase tracking-wider">System Online</span>
                </div>
            </div>
        </aside>

        <!-- Overlay for mobile sidebar -->
        <div id="sidebar-overlay" class="fixed inset-0 bg-black/60 z-40 hidden lg:hidden"></div>

        <!-- Main Chat Area -->
        <main class="flex-1 flex flex-col bg-[#f0f2f5] relative">
            <!-- Messages Window -->
            <div id="chat-window" class="flex-1 overflow-y-auto p-4 lg:p-8 space-y-6">
                <!-- Welcome Message -->
                <div class="flex flex-col items-center justify-center h-full text-center space-y-4 py-20"
                    id="welcome-message">
                    <div
                        class="w-24 h-24 bg-white border-4 border-[#fec923] rounded-3xl flex items-center justify-center mb-4 shadow-xl">
                        <i class="fas fa-graduation-cap text-5xl text-[#592a8a]"></i>
                    </div>
                    <h2 class="text-4xl font-['Oswald'] font-bold text-slate-800 uppercase tracking-tight">Pirate AI
                        Assistant</h2>
                    <p class="text-slate-500 max-w-sm font-medium leading-relaxed">How can I help you navigate Pirate
                        housing and residence hall policies today?</p>
                </div>
            </div>

            <!-- Chat Input Area -->
            <div class="p-4 lg:p-8 bg-white border-t border-slate-200">
                <form id="chat-form" class="relative max-w-4xl mx-auto group">
                    <input type="text" id="user-input"
                        placeholder="Ask about housing policies, dining, or campus living..."
                        class="w-full bg-slate-50 border border-slate-200 rounded-2xl py-5 pl-8 pr-16 text-slate-800 focus:outline-none focus:ring-4 focus:ring-[#592a8a]/5 shadow-sm transition-all placeholder:text-slate-400 font-medium">
                    <button type="submit" id="send-btn"
                        class="absolute right-3 top-1/2 -translate-y-1/2 w-12 h-12 bg-[#592a8a] hover:bg-[#482170] text-white rounded-xl flex items-center justify-center transition-all shadow-lg hover:scale-105 active:scale-95">
                        <i class="fas fa-paper-plane text-sm"></i>
                    </button>
                </form>
                <p class="text-[10px] text-center text-slate-400 mt-4 uppercase tracking-widest font-bold">Official ECU
                    Residence Hall Digital Guide</p>
            </div>
        </main>
    </div>

    <!-- Toast Notifications -->
    <div id="toast-container" class="fixed bottom-24 right-8 z-[100] space-y-4"></div>

    <script src="script.js"></script>
</body>

</html>
